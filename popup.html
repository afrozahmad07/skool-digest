<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skool Daily Digest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');

/* ── Dark (default) variables ── */
:root {
  --bg:       #0d0d0f;
  --surface:  #141418;
  --surface2: #1c1c22;
  --border:   #2a2a33;
  --accent:   #c8f561;
  --purple:   #7c6af7;
  --text:     #e8e8ee;
  --muted:    #6b6b7d;
  --danger:   #ff5757;
  --gold:     #ffd166;
}

/* ── Light mode overrides ── */
body.light-mode {
  --bg:       #f5f5f0;
  --surface:  #ffffff;
  --surface2: #f0f0eb;
  --border:   #ddddd8;
  --accent:   #5a7a1a;
  --purple:   #5046c8;
  --text:     #1a1a24;
  --muted:    #70708a;
  --danger:   #cc2222;
  --gold:     #b87c00;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 480px;
  min-height: 300px;
  max-height: 680px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .2s, color .2s;
}

/* ── Header ── */
.header {
  padding: 14px 18px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; }
.logo-icon svg { width: 15px; height: 15px; }
.logo-name { font-size: 13px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
.logo-sub  { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }
.header-btns { display: flex; gap: 5px; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; display: grid; place-items: center; transition: .15s;
}
.icon-btn:hover { color: var(--accent); border-color: var(--accent); }
.icon-btn svg { width: 13px; height: 13px; }

/* ── Tabs ── */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab {
  flex: 1; padding: 9px;
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); background: transparent;
  border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: .15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── Scroll content ── */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; }
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Digest body ── */
#digestBody { padding: 16px 18px; }
.run-wrap { display: flex; flex-direction: column; gap: 10px; }
.run-btn {
  width: 100%; padding: 13px;
  background: var(--accent); color: #0d0d0f;
  border: none; border-radius: 10px;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: .2s;
}
.run-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.run-btn:active { transform: none; }
.run-btn svg { width: 15px; height: 15px; }
.status-bar {
  padding: 10px 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 8px; line-height: 1.4;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.pulse { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.2; } }
.error-box {
  padding: 12px 13px; background: rgba(255,87,87,.08);
  border: 1px solid rgba(255,87,87,.25); border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--danger); line-height: 1.5; white-space: pre-wrap;
}
.empty-state { text-align: center; padding: 32px 16px; }
.empty-icon  { font-size: 32px; margin-bottom: 10px; }
.empty-title { font-family: 'Instrument Serif', serif; font-size: 17px; margin-bottom: 6px; }
.empty-text  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ── Digest results ── */
.cache-notice { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 10px; }
.cache-notice a { color: var(--purple); }
.digest-header { margin-bottom: 10px; }
.digest-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
.summary { font-family: 'Instrument Serif', serif; font-size: 13px; line-height: 1.6; opacity: .85; margin-bottom: 10px; }
.stats-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-chip { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 14px; }
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
.tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); }

/* ── Export row ── */
.export-row { display: flex; gap: 6px; margin: 12px 0; }
.export-btn {
  flex: 1; padding: 8px 6px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: .15s;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Post cards ── */
.post-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 13px; margin-bottom: 9px; transition: border-color .15s; position: relative; overflow: hidden;
}
.post-card:hover { border-color: var(--purple); }
.post-card.watched::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); }
.post-meta-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.rank { color: var(--muted); }
.age-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; }
.watched-badge { background: rgba(255,209,102,.1); border: 1px solid rgba(255,209,102,.3); border-radius: 3px; padding: 1px 6px; color: var(--gold); text-transform: uppercase; font-size: 9px; }
.post-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
.post-why { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 7px; }
.post-insight { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 12px; color: var(--accent); border-left: 2px solid var(--accent); padding-left: 9px; margin-bottom: 9px; line-height: 1.4; }
.post-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.post-author a { color: var(--purple); text-decoration: none; }
.post-author a:hover { text-decoration: underline; }
.engagement { display: flex; gap: 5px; align-items: center; }
.eng-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 2px 7px; }
.read-link { color: var(--accent); text-decoration: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; transition: .15s; }
.read-link:hover { background: var(--surface2); }

/* ── Settings ── */
#panelSettings { padding: 18px; }
.settings-section { margin-bottom: 18px; }
.settings-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.provider-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
.provider-tab {
  flex: 1; padding: 7px 6px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
}
.provider-tab.active { border-color: var(--purple); color: var(--text); background: rgba(124,106,247,.1); }
.provider-tab:hover:not(.active) { color: var(--text); }
.pdot { width: 7px; height: 7px; border-radius: 50%; }
.pdot-anthropic { background: #c8f561; }
.pdot-openai    { background: #10a37f; }
.pdot-gemini    { background: #4285f4; }
.key-group { display: none; }
.field { width: 100%; padding: 9px 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: .15s; }
.field:focus { border-color: var(--purple); }
.field::placeholder { color: var(--muted); }
.field-hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }
.field-hint a { color: var(--purple); }
.member-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 7px; max-height: 120px; overflow-y: auto; }
.member-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); }
.btn-remove { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 11px; transition: color .15s; }
.btn-remove:hover { color: var(--danger); }
.empty-members { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); padding: 4px 0; }
.add-row { display: flex; gap: 6px; }
.add-row .field { flex: 1; }
.btn-add { padding: 0 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; white-space: nowrap; transition: .15s; }
.btn-add:hover { border-color: var(--accent); }
.save-btn { width: 100%; padding: 11px; border-radius: 8px; border: 1px solid var(--accent); background: rgba(200,245,97,.07); color: var(--accent); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: .15s; margin-top: 4px; }
.save-btn:hover { background: rgba(200,245,97,.14); }
#saveConfirm { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-align: center; margin-top: 7px; opacity: 0; transition: opacity .3s; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M2 8h8M2 12h5" stroke="#0d0d0f" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Daily Digest</div>
      <div class="logo-sub">earlyaidopters</div>
    </div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="btnTheme" title="Toggle theme"></button>
    <button class="icon-btn" id="btnRefresh" title="Clear cache and re-run">
      <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2M13.5 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn" id="btnSettings" title="Settings">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.93 2.93l1.06 1.06M12.01 12.01l1.06 1.06M2.93 13.07l1.06-1.06M12.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="digest">Digest</button>
  <button class="tab" data-tab="settings">Settings</button>
</div>

<!-- Content -->
<div class="content">
  <div id="panelDigest"><div id="digestBody"></div></div>
  <div id="panelSettings" style="display:none">
    <div class="settings-section">
      <label class="settings-label">AI Provider</label>
      <div class="provider-tabs">
        <button class="provider-tab active" data-provider="anthropic"><span class="pdot pdot-anthropic"></span>Claude</button>
        <button class="provider-tab" data-provider="openai"><span class="pdot pdot-openai"></span>OpenAI</button>
        <button class="provider-tab" data-provider="gemini"><span class="pdot pdot-gemini"></span>Gemini</button>
      </div>
      <div class="key-group" data-provider="anthropic" style="display:block">
        <input type="password" class="field" id="inputAnthropic" placeholder="sk-ant-…">
        <div class="field-hint">Get key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
      </div>
      <div class="key-group" data-provider="openai">
        <input type="password" class="field" id="inputOpenAI" placeholder="sk-…">
        <div class="field-hint">Get key at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></div>
      </div>
      <div class="key-group" data-provider="gemini">
        <input type="password" class="field" id="inputGemini" placeholder="AIza…">
        <div class="field-hint">Get key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></div>
      </div>
    </div>
    <div class="settings-section">
      <label class="settings-label">Community URL</label>
      <input type="text" class="field" id="inputCommunity" placeholder="https://www.skool.com/your-community?s=newest">
      <div class="field-hint">The extension will auto-navigate here before every scrape — newest sort is applied automatically.</div>
    </div>
    <div class="settings-section">
      <label class="settings-label">Watched Members</label>
      <div class="member-list" id="memberList"></div>
      <div class="add-row">
        <input type="text" class="field" id="inputMember" placeholder="Member name…">
        <button class="btn-add" id="btnAddMember">+ Add</button>
      </div>
      <div class="field-hint" style="margin-top:5px">Their posts always appear in the digest.</div>
    </div>
    <button class="save-btn" id="btnSave">Save Settings</button>
    <div id="saveConfirm">✓ Saved</div>
  </div>
</div>

<script type="module" src="src/popup.js"></script>
</body>
</html>
