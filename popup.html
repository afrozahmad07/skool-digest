<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skool Daily Digest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* ── Dark (default) ── */
:root {
  --bg:       #111110;
  --surface:  #1c1c1a;
  --surface2: #232320;
  --border:   #2e2e2b;
  --text:     #eeedea;
  --muted:    #90908a;
  --muted2:   #5a5a55;
  --accent:   #c8f561;
  --accent-bg:rgba(200,245,97,.08);
  --gold:     #e8a020;
  --danger:   #f05454;
  --shadow:   0 1px 4px rgba(0,0,0,.45);
}

/* ── Light mode ── */
body.light-mode {
  --bg:       #faf9f6;
  --surface:  #ffffff;
  --surface2: #f3f2ee;
  --border:   #e8e6e0;
  --text:     #1c1b18;
  --muted:    #8a8880;
  --muted2:   #b8b6b0;
  --accent:   #4a6b10;
  --accent-bg:rgba(74,107,16,.07);
  --gold:     #b06010;
  --danger:   #cc2222;
  --shadow:   0 1px 3px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 480px;
  min-height: 300px;
  max-height: 680px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background .2s, color .2s;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 9px; }
.logo-icon {
  width: 26px; height: 26px;
  background: var(--accent); border-radius: 6px;
  display: grid; place-items: center; flex-shrink: 0;
}
.logo-icon svg { width: 13px; height: 13px; }
.logo-name { font-size: 13px; font-weight: 700; letter-spacing: -.01em; color: var(--text); }
.logo-sub  { font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 1px; }
.header-btns { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: none; background: transparent;
  color: var(--muted); cursor: pointer;
  display: grid; place-items: center; transition: color .15s, background .15s;
}
.icon-btn:hover { color: var(--text); background: var(--surface2); }
.icon-btn svg { width: 14px; height: 14px; }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 9px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--muted); background: transparent;
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: color .15s, border-color .15s;
  letter-spacing: 0;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
.tab:hover:not(.active) { color: var(--text); }

/* ── Scroll content ── */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; }
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Digest body ── */
#digestBody { padding: 16px; }

/* ── Run / status states ── */
.run-wrap { display: flex; flex-direction: column; gap: 10px; }
.run-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #111110;
  border: none; border-radius: 10px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 7px; transition: opacity .15s, transform .15s; letter-spacing: -.01em;
}
.run-btn:hover { opacity: .9; transform: translateY(-1px); }
.run-btn:active { transform: none; }
.run-btn svg { width: 14px; height: 14px; }

.status-bar {
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 8px; line-height: 1.4;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); flex-shrink: 0; }
.dot.pulse { background: var(--accent); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.25; } }

.error-box {
  padding: 12px 14px;
  background: rgba(240,84,84,.07);
  border: 1px solid rgba(240,84,84,.2);
  border-radius: 8px;
  font-size: 12px; color: var(--danger); line-height: 1.55; white-space: pre-wrap;
}

.empty-state { text-align: center; padding: 36px 16px; }
.empty-icon  { font-size: 28px; margin-bottom: 10px; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; letter-spacing: -.02em; }
.empty-text  { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ── Digest header ── */
.cache-notice {
  font-size: 11px; color: var(--muted); margin-bottom: 12px;
}
.cache-notice a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }

.digest-header { margin-bottom: 14px; }
.digest-community {
  font-size: 11px; font-weight: 500; color: var(--accent);
  letter-spacing: .02em; text-transform: uppercase;
  margin-bottom: 3px;
}
.digest-community a { color: inherit; text-decoration: none; }
.digest-date {
  font-size: 11px; color: var(--muted); margin-bottom: 8px;
}
.summary {
  font-size: 13px; line-height: 1.65; color: var(--text);
  opacity: .8; margin-bottom: 10px;
}
.digest-meta {
  font-size: 11px; color: var(--muted); margin-bottom: 4px;
}

/* ── Export row ── */
.export-row { display: flex; gap: 6px; margin: 12px 0 14px; }
.export-btn {
  flex: 1; padding: 8px 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 5px; transition: color .15s, border-color .15s;
}
.export-btn:hover { border-color: var(--text); color: var(--text); }

/* ── Tags / trending ── */
.section-divider {
  font-size: 11px; font-weight: 500; color: var(--muted2);
  margin: 14px 0 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tag {
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--muted);
}

/* ── Post cards ── */
.post-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  transition: border-color .15s;
  position: relative; overflow: hidden;
}
.post-card:hover { border-color: var(--muted2); }
.post-card.watched { border-color: rgba(232,160,32,.35); }
.post-card.watched::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--gold);
}

.post-meta-top {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 7px;
  font-size: 11px; color: var(--muted);
}
.rank { font-weight: 600; color: var(--muted2); }
.age-badge {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: 10px;
}
.watched-badge {
  background: rgba(232,160,32,.1); border: 1px solid rgba(232,160,32,.25);
  border-radius: 4px; padding: 1px 7px; font-size: 10px; font-weight: 500;
  color: var(--gold);
}

.post-title {
  font-size: 14px; font-weight: 600; line-height: 1.45;
  margin-bottom: 6px; letter-spacing: -.01em; color: var(--text);
}
.post-why {
  font-size: 12px; color: var(--muted);
  line-height: 1.6; margin-bottom: 8px;
}
.post-insight {
  font-size: 12px; font-style: italic;
  color: var(--text); opacity: .75;
  border-left: 2px solid var(--accent);
  padding-left: 10px; margin-bottom: 10px; line-height: 1.55;
}
.post-footer {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 11px; color: var(--muted);
}
.post-author { color: var(--muted); }
.post-author a { color: var(--text); text-decoration: none; opacity: .7; }
.post-author a:hover { opacity: 1; }
.engagement { display: flex; gap: 6px; align-items: center; }
.eng-pill {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; color: var(--muted);
}
.read-link {
  color: var(--accent); text-decoration: none; font-weight: 500; font-size: 11px;
  padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; transition: .15s;
  margin-left: auto;
}
.read-link:hover { background: var(--accent-bg); border-color: var(--accent); }

/* ── Settings ── */
#panelSettings { padding: 16px; }
.settings-section { margin-bottom: 20px; }
.settings-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 8px; letter-spacing: .03em;
  text-transform: uppercase;
}
.provider-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
.provider-tab {
  flex: 1; padding: 7px 6px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.provider-tab.active { border-color: var(--accent); color: var(--text); background: var(--accent-bg); }
.provider-tab:hover:not(.active) { color: var(--text); border-color: var(--muted2); }
.pdot { width: 6px; height: 6px; border-radius: 50%; }
.pdot-anthropic { background: #c8f561; }
.pdot-openai    { background: #10a37f; }
.pdot-gemini    { background: #4285f4; }
.key-group { display: none; }
.field {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px;
  outline: none; transition: border-color .15s;
}
.field:focus { border-color: var(--muted); }
.field::placeholder { color: var(--muted2); }
.field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
.field-hint a { color: var(--text); opacity: .6; text-decoration: underline; text-underline-offset: 2px; }
.field-hint a:hover { opacity: 1; }
.member-list {
  display: flex; flex-direction: column; gap: 4px;
  margin-bottom: 8px; max-height: 120px; overflow-y: auto;
}
.member-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; color: var(--text);
}
.btn-remove {
  background: transparent; border: none; color: var(--muted2);
  cursor: pointer; font-size: 13px; transition: color .15s; line-height: 1;
}
.btn-remove:hover { color: var(--danger); }
.empty-members { font-size: 12px; color: var(--muted); padding: 4px 0; }
.add-row { display: flex; gap: 6px; }
.add-row .field { flex: 1; }
.btn-add {
  padding: 0 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: .15s;
}
.btn-add:hover { border-color: var(--muted); }
.save-btn {
  width: 100%; padding: 11px; border-radius: 8px;
  border: none; background: var(--accent); color: #111110;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .15s; margin-top: 4px;
  letter-spacing: -.01em;
}
.save-btn:hover { opacity: .88; }
#saveConfirm {
  font-size: 12px; color: var(--muted); text-align: center;
  margin-top: 8px; opacity: 0; transition: opacity .3s;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M2 8h8M2 12h5" stroke="#111110" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Daily Digest</div>
      <div class="logo-sub" id="headerCommunity">earlyaidopters</div>
    </div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="btnTheme" title="Toggle theme"></button>
    <button class="icon-btn" id="btnRefresh" title="Clear cache and re-run">
      <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2M13.5 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn" id="btnSettings" title="Settings">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M2.93 2.93l1.06 1.06M12.01 12.01l1.06 1.06M2.93 13.07l1.06-1.06M12.01 3.99l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="digest">Digest</button>
  <button class="tab" data-tab="settings">Settings</button>
</div>

<!-- Content -->
<div class="content">
  <div id="panelDigest"><div id="digestBody"></div></div>
  <div id="panelSettings" style="display:none">
    <div class="settings-section">
      <label class="settings-label">AI Provider</label>
      <div class="provider-tabs">
        <button class="provider-tab active" data-provider="anthropic"><span class="pdot pdot-anthropic"></span>Claude</button>
        <button class="provider-tab" data-provider="openai"><span class="pdot pdot-openai"></span>OpenAI</button>
        <button class="provider-tab" data-provider="gemini"><span class="pdot pdot-gemini"></span>Gemini</button>
      </div>
      <div class="key-group" data-provider="anthropic" style="display:block">
        <input type="password" class="field" id="inputAnthropic" placeholder="sk-ant-…">
        <div class="field-hint">Get key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>
      </div>
      <div class="key-group" data-provider="openai">
        <input type="password" class="field" id="inputOpenAI" placeholder="sk-…">
        <div class="field-hint">Get key at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></div>
      </div>
      <div class="key-group" data-provider="gemini">
        <input type="password" class="field" id="inputGemini" placeholder="AIza…">
        <div class="field-hint">Get key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></div>
      </div>
    </div>
    <div class="settings-section">
      <label class="settings-label">Watched Members</label>
      <div class="member-list" id="memberList"></div>
      <div class="add-row">
        <input type="text" class="field" id="inputMember" placeholder="Member name…">
        <button class="btn-add" id="btnAddMember">+ Add</button>
      </div>
      <div class="field-hint" style="margin-top:6px">Their posts always appear at the top of the digest.</div>
    </div>
    <button class="save-btn" id="btnSave">Save Settings</button>
    <div id="saveConfirm">✓ Saved</div>
  </div>
</div>

<script type="module" src="src/popup.js"></script>
</body>
</html>
